<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три колонки с float</title>

<style>
* {
    box-sizing: border-box;
}

#left {
    float: left;
    width: 200px;
    background: #ccf;
}

#right {
    float: right;
    width: 200px;
    background: #fcc;
}

#center {
    margin-left: 200px;
    margin-right: 200px;
    background: #cfc;
}

/* Очистка float */
body::after {
    content: "";
    display: block;
    clear: both;
}
</style>
</head>

<body>

<div id="left">
    left
left
left
left
left
</div>

<div id="right">
    right
right
right
right
</div>

<div id="center">
    Далеко-далеко за словесными горами в стране гласных и согласных живут рыбные тексты...
</div>

</bo
