<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Горизонтальное меню</title>

<style>
.menu {
    list-style: none;
    margin: 0;
    padding: 0;
    overflow: hidden; /* чтобы родитель обтекал float */
    background: #eee;
}

.menu li {
    float: left; /* делаем меню горизонтальным */
}

.menu li a {
    display: block;
    padding: 10px 20px;
    background: #ccf;
    text-decoration: none;
    color: black;
}

/* эффект при наведении */
.menu li a:hover {
    background: #99c;
}
</style>

</head>

<body>

<ul class="menu">
    <li><a href="#">Пункт 1</a></li>
    <li><a href="#">Пункт 2</a></li>
    <li><a href="#">Пункт 3</a></li>
    <li><a href="#">Пункт 4</a></li>
    <li><a href="#">Пункт 5</a></li>
</ul>

</body>
</html>
